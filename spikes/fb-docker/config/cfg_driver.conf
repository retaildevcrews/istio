# For use with FB Docker and STDOUT tail
[SERVICE]
    Flush               1
    Daemon              Off
    Log_Level           info
    HTTP_Server         On
    HTTP_Listen         0.0.0.0
    Parsers_File        parsers.conf
    HTTP_Port           2020
    storage.path        /var/log/flb-storage/
    storage.sync        normal
    storage.backlog.mem_limit 32MB
[FILTER]
    Name                parser
    Match               *
    Parser              json
    Key_Name            log
    Reserve_Data        On
[FILTER]
    Name                modify
    Match               *
    Add                 k_app       ngsa-memory
    Add                 kubernetes_container_name ngsa-${HOSTNAME}
[INPUT]
    Name                forward
    Listen              0.0.0.0
    port                24224
[OUTPUT]
    Name                stdout
    Match               *
