# Overall Settings
[SERVICE]
    Flush               1
    Daemon              Off
    Log_Level           info
    HTTP_Server         On
    HTTP_Listen         0.0.0.0
    HTTP_Port           2020
    Parsers_File        parsers.conf
    storage.path        /var/tmp/log/flb-storage/
    storage.sync        normal
    storage.backlog.mem_limit 32MB

# Input logs
[INPUT]
    Name                tail
    Tag                 docker.*
    Path                /workspaces/istio/spikes/fb-docker/output.log
    # Path                /var/lib/docker/containers/*/*-json.log
    multiline.parser    docker, cri
    DB                  /var/tmp/log/flb_docker.db
    Ignore_Older        2m
    Mem_Buf_Limit       32MB
    Skip_Long_Lines     Off
    Skip_Empty_Lines    Off
    Refresh_Interval    10
    storage.type        filesystem

# Modification via filter
[FILTER]
    Name                parser
    Match               *
    # Since this is baremetal, default json parser is not available directly 
    Parser              simple-json 
    Key_Name            log
    Reserve_Data        On
[FILTER]
    Name    modify
    Match   docker.*
    Add     k_app       ngsa-memory

# Output
[OUTPUT]
    Name                stdout
    match               docker.*

